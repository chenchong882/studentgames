<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>殭屍堡壘 3D Zombie Fort</title>
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#000;
    font-family:-apple-system,"PingFang TC","Microsoft JhengHei",sans-serif;}
  canvas{display:block;}
  #cross{position:fixed;left:50%;top:50%;width:26px;height:26px;transform:translate(-50%,-50%);
    pointer-events:none;z-index:6;}
  #ammo{position:fixed;right:22px;bottom:18px;text-align:right;color:#fff;z-index:5;
    text-shadow:0 2px 6px rgba(0,0,0,.7);pointer-events:none;}
  #ammo .gname{font-size:13px;color:rgba(255,255,255,.75);letter-spacing:2px;margin-bottom:2px;}
  #ammo .num{font-size:34px;font-weight:800;}
  #ammo .num small{font-size:18px;color:rgba(255,255,255,.65);font-weight:700;}
  #ammo .num.low{color:#ff5a4a;animation:pulse 1s infinite;}
  #kills{position:fixed;top:14px;left:14px;background:rgba(18,20,26,.55);
    padding:9px 16px;border-radius:8px;color:#cfd3da;font-size:13px;z-index:5;
    backdrop-filter:blur(3px);pointer-events:none;}
  #kills .val{font-weight:800;color:#fff;font-size:18px;margin-left:8px;}
  #status{position:fixed;top:14px;left:50%;transform:translateX(-50%);z-index:5;color:#fff;
    text-align:center;text-shadow:0 2px 6px #000;pointer-events:none;min-width:250px;}
  #wave{font-size:21px;font-weight:900;letter-spacing:1px;color:#ffe59a;}
  #question{margin-top:5px;font-size:17px;font-weight:800;background:rgba(12,19,28,.68);
    padding:7px 14px;border-radius:10px;display:inline-block;max-width:min(88vw,580px);}
  #combo{font-size:13px;margin-top:5px;color:#b9ebff;font-weight:800;}
  #health{position:fixed;left:14px;bottom:18px;z-index:5;color:#fff;pointer-events:none;
    text-shadow:0 2px 6px #000;font-weight:800;}
  #health .bar{width:154px;height:10px;border-radius:6px;background:rgba(0,0,0,.48);overflow:hidden;margin-top:5px;}
  #health .fill{height:100%;width:100%;background:linear-gradient(90deg,#ff5544,#ffd54f);transition:width .15s;}
  #objective{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);z-index:5;color:#d7f5ff;
    background:rgba(12,24,30,.58);padding:7px 14px;border-radius:9px;font-size:13px;font-weight:700;
    text-align:center;pointer-events:none;max-width:75vw;}
  #damageFlash{position:fixed;inset:0;pointer-events:none;z-index:6;opacity:0;
    background:radial-gradient(ellipse at center,transparent 42%,rgba(220,28,25,.7) 100%);}
  #damageFlash.show{animation:damageFlash .33s ease-out;}
  @keyframes damageFlash{0%{opacity:.9}100%{opacity:0}}
  #back{position:fixed;right:14px;top:14px;z-index:8;min-height:44px;display:flex;align-items:center;
    padding:0 12px;border-radius:10px;background:rgba(20,26,38,.68);color:#ffe9a8;text-decoration:none;
    font-size:13px;font-weight:800;border:1px solid rgba(255,216,120,.4);}
  #hitmark{position:fixed;left:50%;top:50%;width:34px;height:34px;transform:translate(-50%,-50%);
    pointer-events:none;z-index:6;opacity:0;}
  #hitmark.show{animation:hitPop .18s ease-out;}
  @keyframes hitPop{0%{opacity:1;transform:translate(-50%,-50%) scale(1.35)}100%{opacity:0;transform:translate(-50%,-50%) scale(0.9)}}
  #reloadBar{position:fixed;left:50%;top:calc(50% + 34px);width:56px;height:6px;
    transform:translateX(-50%);background:rgba(35,40,48,.85);border-radius:3px;
    overflow:hidden;z-index:6;display:none;pointer-events:none;}
  #reloadFill{height:100%;width:0;background:#f0b35e;}
  .pop{position:fixed;color:#fff;font-weight:800;font-size:17px;pointer-events:none;
    text-shadow:0 1px 5px #000;transform:translate(-50%,-50%);animation:popUp .9s forwards;z-index:6;}
  @keyframes popUp{from{opacity:1;transform:translate(-50%,-50%)}to{opacity:0;transform:translate(-50%,-190%)}}
  #hint{position:fixed;bottom:8px;left:0;width:100%;text-align:center;
    color:rgba(255,255,255,.6);font-size:12px;pointer-events:none;z-index:5;text-shadow:0 1px 3px #000;}
  #banner{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:5;
    background:rgba(18,20,26,.6);padding:8px 22px;border-radius:9px;color:#ffe9a8;
    font-size:15px;font-weight:700;backdrop-filter:blur(3px);pointer-events:none;}
  #overlay{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
    background:rgba(8,12,20,.62);color:#fff;text-align:center;z-index:9;}
  #overlay h1{font-size:52px;margin:0 0 8px;color:#ffe9a8;text-shadow:0 3px 16px #000;}
  #overlay .sub{letter-spacing:6px;color:rgba(255,255,255,.7);margin-bottom:26px;}
  #overlay p{margin:6px 0;font-size:16px;color:rgba(255,255,255,.92);}
  #overlay .go{margin-top:24px;font-size:17px;font-weight:700;color:#ffd878;}
  @keyframes pulse{0%,100%{opacity:.55}50%{opacity:1}}
  .actionBtn{appearance:none;border:0;border-radius:12px;background:linear-gradient(180deg,#ffd96d,#e99b34);
    color:#222;padding:14px 26px;font-size:19px;font-weight:900;box-shadow:0 4px 0 #9c5b1c;cursor:pointer;
    min-height:48px;font-family:inherit;}
  .actionBtn:active{transform:translateY(3px);box-shadow:0 1px 0 #9c5b1c;}
  .actionBtn:focus-visible,.choiceBtn:focus-visible,#fireBtn:focus-visible,#jumpBtn:focus-visible{outline:3px solid #fff;outline-offset:3px;}
  #quiz{position:fixed;inset:0;display:none;align-items:center;justify-content:center;z-index:10;
    background:rgba(5,10,16,.68);color:#fff;text-align:center;padding:20px;}
  #quiz.show{display:flex;}
  #quizCard{max-width:440px;background:linear-gradient(145deg,#1d2c37,#0d151d);border:1px solid rgba(255,219,117,.7);
    border-radius:18px;padding:28px 24px;box-shadow:0 14px 50px #000;}
  #quizTitle{font-size:22px;font-weight:900;color:#ffe39a;margin-bottom:9px;}
  #quizPrompt{font-size:18px;margin-bottom:18px;line-height:1.55;}
  #quizChoices{display:grid;gap:10px;}
  .choiceBtn{font:inherit;font-size:18px;font-weight:800;min-height:48px;border-radius:10px;border:1px solid #6ca8bd;
    color:#fff;background:#274553;cursor:pointer;}
  /* ===== 觸控操控（平板 / 手機） ===== */
  #touchUI{position:fixed;inset:0;z-index:7;pointer-events:none;}
  #moveStick{position:absolute;left:26px;bottom:26px;width:140px;height:140px;border-radius:50%;
    border:2px solid rgba(255,255,255,.30);background:rgba(20,26,38,.34);}
  #moveKnob{position:absolute;left:70px;top:70px;width:58px;height:58px;border-radius:50%;
    transform:translate(-50%,-50%);background:rgba(255,216,120,.55);
    border:2px solid rgba(255,255,255,.55);}
  #fireBtn{position:absolute;right:30px;bottom:110px;width:104px;height:104px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;color:#fff;
    background:rgba(255,70,60,.32);border:3px solid rgba(255,95,85,.75);text-shadow:0 1px 4px #000;}
  #fireBtn.active{background:rgba(255,70,60,.6);}
  #fireBtn,#jumpBtn{pointer-events:auto;touch-action:none;font-family:inherit;}
  #jumpBtn{position:absolute;right:150px;bottom:52px;width:70px;height:70px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:#fff;
    background:rgba(80,160,255,.28);border:3px solid rgba(120,180,255,.7);text-shadow:0 1px 4px #000;}
  #btnPause{position:absolute;top:14px;right:14px;width:46px;height:46px;border-radius:12px;
    font-size:20px;background:rgba(20,26,38,.6);color:#ffe9a8;
    border:1px solid rgba(255,216,120,.4);pointer-events:auto;}
  .hidden{display:none !important;}
</style>

  <p>答對單字，升級火力，撐過殭屍波次後逃離堡壘。</p>
  <p>桌機：WASD 移動、滑鼠瞄準、左鍵開槍；手機：左搖桿移動、右側滑動瞄準。</p>
  <p class="go" id="goText">開始會解鎖音效與英文發音</p>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
<script>
'use strict';
/* ============ 工具 ============ */
const TAU=Math.PI*2;
const rnd=(a=1,b)=>b===undefined?Math.random()*a:a+Math.random()*(b-a);
const clamp=(v,a,b)=>v<a?a:(v>b?b:v);
const isTouch=matchMedia('(pointer:coarse)').matches;

/* ============ 單字資料（注入鏈：postMessage / hash / 內建 VOCAB） ============ */
let VOCAB=[
  {word:'zombie',chinese:'殭屍'},{word:'gun',chinese:'槍'},{word:'wall',chinese:'牆壁'},
  {word:'door',chinese:'門'},{word:'brick',chinese:'磚頭'},{word:'run',chinese:'跑'},
  {word:'jump',chinese:'跳'},{word:'shoot',chinese:'射擊'},{word:'floor',chinese:'地板'},
  {word:'grass',chinese:'草地'},{word:'sky',chinese:'天空'},{word:'cloud',chinese:'雲'}
];
function normalizeGunVocab(list){
  if(!Array.isArray(list))return[];
  return list.map(o=>{
    if(!o)return null;
    const w=o.word||o.en, c=o.chinese||o.zh||o.meaning;
    return (w&&c)?{word:String(w),chinese:String(c)}:null;
  }).filter(Boolean);
}
function applyGunData(payload){
  const ws=normalizeGunVocab(payload&&payload.words);
  if(ws.length)VOCAB=ws;
}
window.addEventListener('message',e=>{
  const d=e.data;
  if(d&&d.type==='GUN_DATA'&&d.payload)applyGunData(d.payload);
});
try{
  const m=location.hash.match(/lessonData=([^&]+)/);
  if(m)applyGunData(JSON.parse(decodeURIComponent(m[1])));
}catch(e){}

/* ============ 音效（Web Audio 合成） ============ */
let AC=null,master=null,noiseBuf=null;
function ensureAudio(){
  if(AC){if(AC.state==='suspended')AC.resume();return;}
  AC=new (window.AudioContext||window.webkitAudioContext)();
  master=AC.createGain();master.gain.value=0.4;master.connect(AC.destination);
  noiseBuf=AC.createBuffer(1,AC.sampleRate,AC.sampleRate);
  const d=noiseBuf.getChannelData(0);
  for(let i=0;i<d.length;i++)d[i]=Math.random()*2-1;
}
function noiseSnd(dur,f0,f1,vol,type='lowpass'){
  if(!AC)return;const t=AC.currentTime;
  const n=AC.createBufferSource();n.buffer=noiseBuf;
  const f=AC.createBiquadFilter();f.type=type;
  f.frequency.setValueAtTime(f0,t);
  f.frequency.exponentialRampToValueAtTime(Math.max(40,f1),t+dur);
  const g=AC.createGain();g.gain.setValueAtTime(vol,t);
  g.gain.exponentialRampToValueAtTime(0.001,t+dur);
  n.connect(f);f.connect(g);g.connect(master);n.start(t);n.stop(t+dur+0.05);
}
function tone(freq,dur,vol,type='square',f1){
  if(!AC)return;const t=AC.currentTime;
  const o=AC.createOscillator();o.type=type;
  o.frequency.setValueAtTime(freq,t);
  if(f1)o.frequency.exponentialRampToValueAtTime(f1,t+dur);
  const g=AC.createGain();g.gain.setValueAtTime(vol,t);
  g.gain.exponentialRampToValueAtTime(0.001,t+dur);
  o.connect(g);g.connect(master);o.start(t);o.stop(t+dur+0.05);
}
const sndShot=()=>{noiseSnd(0.14,3200,300,0.5,'highpass');tone(190,0.09,0.3,'square',55);};
const sndEmpty=()=>tone(900,0.05,0.15,'square',600);
const sndMagOut=()=>{tone(430,0.07,0.22,'square',300);noiseSnd(0.06,2200,700,0.12,'highpass');};
const sndMagIn=()=>{tone(760,0.08,0.26,'square',920);noiseSnd(0.05,1600,500,0.1,'highpass');};
const sndHit=()=>tone(150,0.06,0.26,'square',90);
const sndHead=()=>tone(1250,0.09,0.22,'sine',1650);
const sndKill=()=>{noiseSnd(0.25,900,150,0.3);tone(90,0.2,0.3,'sawtooth',45);};
const sndPickup=()=>{tone(660,0.07,0.24,'square');setTimeout(()=>tone(990,0.09,0.24,'square'),80);};
const sndHurt=()=>{noiseSnd(0.15,600,90,0.32);tone(110,0.12,0.22,'sawtooth',55);};
const sndWave=()=>{tone(330,0.14,0.18,'square');setTimeout(()=>tone(495,0.16,0.2,'square'),150);};
const sndShield=()=>{tone(480,0.11,0.25,'sine');setTimeout(()=>tone(840,0.24,0.28,'sine'),100);};
let bgmNodes=null,speechToken=0,activeUtterance=null,voices=[];
function startBgm(){
  if(!AC||bgmNodes)return;
  const g=AC.createGain();g.gain.value=0.035;g.connect(master);
  const a=AC.createOscillator(),b=AC.createOscillator();a.type='sine';b.type='triangle';
  a.frequency.value=55;b.frequency.value=82.41;a.connect(g);b.connect(g);a.start();b.start();bgmNodes={a,b,g};
}
function stopBgm(){
  if(!bgmNodes)return;
  try{bgmNodes.a.stop();bgmNodes.b.stop();}catch(e){} bgmNodes=null;
}
function refreshVoices(){try{voices=speechSynthesis.getVoices()||[];}catch(e){voices=[];}}
refreshVoices();
try{speechSynthesis.addEventListener('voiceschanged',refreshVoices);}catch(e){}
function speakWord(word){
  if(!word||!('speechSynthesis' in window))return;
  const token=++speechToken, ios=/iPad|iPhone|iPod/.test(navigator.userAgent)||
    (navigator.platform==='MacIntel'&&navigator.maxTouchPoints>1);
  try{
    const s=speechSynthesis;if(s.speaking||s.pending)s.cancel();
    if(ios&&AC&&AC.state==='running')AC.suspend();
    const u=new SpeechSynthesisUtterance(word);activeUtterance=u;u.lang='en-US';u.rate=.86;
    const v=voices.find(x=>/^en(-|_)/i.test(x.lang));if(v)u.voice=v;
    const restore=()=>{if(token!==speechToken)return;if(ios&&AC&&AC.state==='suspended')AC.resume();};
    u.onend=restore;u.onerror=restore;s.speak(u);setTimeout(restore,3500);
  }catch(e){if(ios&&AC&&AC.state==='suspended')AC.resume();}
}

/* ============ 像素材質（canvas 產生，無外部圖檔） ============ */
function texCanvas(size,fn){
  const c=document.createElement('canvas');c.width=c.height=size;
  fn(c.getContext('2d'),size);
  const t=new THREE.CanvasTexture(c);
  t.wrapS=t.wrapT=THREE.RepeatWrapping;
  t.magFilter=THREE.NearestFilter;t.colorSpace=THREE.SRGBColorSpace;
  return t;
}
const TEX={};
TEX.brick=texCanvas(128,(g,s)=>{           // 紅磚牆：一格＝2×2 公尺，8 排磚
  g.fillStyle='#cbc4b6';g.fillRect(0,0,s,s);
  const bh=16,bw=32;
  for(let r=0;r<8;r++)for(let c=-1;c<5;c++){
    const off=(r%2)?bw/2:0;
    g.fillStyle=`rgb(${175+rnd(-18,14)|0},${70+rnd(-12,12)|0},${48+rnd(-10,10)|0})`;
    g.fillRect(c*bw+off+2,r*bh+2,bw-4,bh-4);
  }
});
TEX.sand=texCanvas(128,(g,s)=>{            // 沙磚（門框）：淺黃小磚
  g.fillStyle='#c9b382';g.fillRect(0,0,s,s);
  const bh=16,bw=32;
  for(let r=0;r<8;r++)for(let c=-1;c<5;c++){
    const off=(r%2)?bw/2:0;
    g.fillStyle=`rgb(${216+rnd(-14,12)|0},${190+rnd(-14,10)|0},${130+rnd(-12,12)|0})`;
    g.fillRect(c*bw+off+2,r*bh+2,bw-4,bh-4);
  }
});
TEX.plank=texCanvas(128,(g,s)=>{           // 木板地：一格＝2×2 公尺，4 排木板
  g.fillStyle='#8a6a33';g.fillRect(0,0,s,s);
  const ph=32,pw=64;
  for(let r=0;r<4;r++)for(let c=-1;c<3;c++){
    const off=(r%2)?pw/2:0;
    g.fillStyle=`rgb(${212+rnd(-16,12)|0},${172+rnd(-16,10)|0},${100+rnd(-14,12)|0})`;
    g.fillRect(c*pw+off+2,r*ph+2,pw-4,ph-4);
    g.fillStyle='rgba(120,86,40,.35)';
    for(let i=0;i<3;i++)g.fillRect(c*pw+off+8+i*16,r*ph+6,2,ph-12);
  }
});
TEX.grass=texCanvas(128,(g,s)=>{           // 草地：綠底加雜點
  g.fillStyle='#5fb32e';g.fillRect(0,0,s,s);
  for(let i=0;i<900;i++){
    g.fillStyle=`rgb(${70+rnd(-30,40)|0},${165+rnd(-40,35)|0},${40+rnd(-20,30)|0})`;
    g.fillRect(rnd(s)|0,rnd(s)|0,3,3);
  }
});
TEX.crate=texCanvas(128,(g,s)=>{           // 木箱
  g.fillStyle='#b8905a';g.fillRect(0,0,s,s);
  g.strokeStyle='#7a5a2e';g.lineWidth=10;g.strokeRect(5,5,s-10,s-10);
  g.lineWidth=6;g.beginPath();g.moveTo(8,8);g.lineTo(s-8,s-8);g.moveTo(s-8,8);g.lineTo(8,s-8);g.stroke();
});
TEX.ammo=texCanvas(64,(g,s)=>{             // 彈藥箱：軍綠底＋黃色彈頭
  g.fillStyle='#3e5a2e';g.fillRect(0,0,s,s);
  g.strokeStyle='#2a3d1f';g.lineWidth=6;g.strokeRect(3,3,s-6,s-6);
  g.fillStyle='#ffd34d';
  for(let i=0;i<3;i++){g.fillRect(14+i*14,24,8,20);g.fillRect(15+i*14,18,6,7);}
});
TEX.zface=texCanvas(64,(g,s)=>{            // 殭屍臉
  g.fillStyle='#4f9c3a';g.fillRect(0,0,s,s);
  for(let i=0;i<60;i++){g.fillStyle=`rgba(60,120,40,${rnd(0.2,0.5)})`;g.fillRect(rnd(s)|0,rnd(s)|0,6,6);}
  g.fillStyle='#111';g.fillRect(12,22,12,10);g.fillRect(40,22,12,10);   // 眼
  g.fillStyle='#2a4d1e';g.fillRect(26,40,12,14);                        // 嘴
});

/* ============ 場景 ============ */
const SKY=0x87ceeb;

function matOf(tex,rx,ry){
  const t=tex.clone();t.needsUpdate=true;t.repeat.set(rx,ry);
  return new THREE.MeshLambertMaterial({map:t});
}
function block(w,h,d,tex,su=2){    // 三組材質讓磚紋依尺寸正確重複
  const mx=matOf(tex,d/su,h/su),mz=matOf(tex,w/su,h/su),my=matOf(tex,w/su,d/su);
  return new THREE.Mesh(new THREE.BoxGeometry(w,h,d),[mx,mx,my,my,mz,mz]);
}

/* ============ 碰撞（3D AABB 清單：帶高度，可站上箱子） ============ */
const solids=[];
const addSolid=(x1,z1,x2,z2,y2=99,y1=0)=>solids.push({x1,z1,x2,z2,y1,y2});
const PR=0.42, PH=1.7;              // 玩家半徑 / 身高
function collide(px,pz,foot){
  for(const s of solids)
    if(px>s.x1-PR&&px<s.x2+PR&&pz>s.z1-PR&&pz<s.z2+PR&&
       foot<s.y2-0.02&&foot+PH>s.y1)return s;
  return null;
}
function groundAt(px,pz,foot){       // 腳下最高的可站表面（含箱頂）
  let g=0;
  for(const s of solids)
    if(px>s.x1-PR*0.7&&px<s.x2+PR*0.7&&pz>s.z1-PR*0.7&&pz<s.z2+PR*0.7&&
       s.y2<=foot+0.06&&s.y2>g)g=s.y2;
  return g;
}

/* ============ 堡壘建造 ============ */
const T=0.7, DOOR_W=2.6, DOOR_H=3, FR=0.9;   // 牆厚 / 門寬 / 門高 / 門框寬

function segX(x1,x2,z0,h,tex){      // 沿 X 軸的牆段
  if(x2-x1<0.05)return;
  const m=block(x2-x1,h,T,tex);m.position.set((x1+x2)/2,h/2,z0);scene.add(m);
  addSolid(x1,z0-T/2,x2,z0+T/2,h);
}
function segZ(z1,z2,x0,h,tex){      // 沿 Z 軸的牆段
  if(z2-z1<0.05)return;
  const m=block(T,h,z2-z1,tex);m.position.set(x0,h/2,(z1+z2)/2);scene.add(m);
  addSolid(x0-T/2,z1,x0+T/2,z2,h);
}
function wallX(x1,x2,z0,h,doors){   // 帶門的 X 向牆，doors＝門中心的 x 座標
  const ds=doors.slice().sort((a,b)=>a-b);let cur=x1;
  for(const dc of ds){
    const gl=dc-DOOR_W/2,gr=dc+DOOR_W/2;
    segX(cur,gl-FR,z0,h,TEX.brick);
    segX(gl-FR,gl,z0,h,TEX.sand);segX(gr,gr+FR,z0,h,TEX.sand);   // 沙磚門框
    const lin=block(DOOR_W,h-DOOR_H,T,TEX.brick);                 // 門楣（不加碰撞）
    lin.position.set(dc,DOOR_H+(h-DOOR_H)/2,z0);scene.add(lin);
    cur=gr+FR;
  }
  segX(cur,x2,z0,h,TEX.brick);
}
function wallZ(z1,z2,x0,h,doors){   // 帶門的 Z 向牆，doors＝門中心的 z 座標
  const ds=doors.slice().sort((a,b)=>a-b);let cur=z1;
  for(const dc of ds){
    const gl=dc-DOOR_W/2,gr=dc+DOOR_W/2;
    segZ(cur,gl-FR,x0,h,TEX.brick);
    segZ(gl-FR,gl,x0,h,TEX.sand);segZ(gr,gr+FR,x0,h,TEX.sand);
    const lin=block(T,h-DOOR_H,DOOR_W,TEX.brick);
    lin.position.set(x0,DOOR_H+(h-DOOR_H)/2,dc);scene.add(lin);
    cur=gr+FR;
  }
  segZ(cur,z2,x0,h,TEX.brick);
}
/* 矩形堡壘：doors＝{n,s,e,w: 各面門中心的偏移陣列}，木板地板鋪滿 */
function fort(cx,cz,w,d,h,doors={}){
  const hw=w/2,hd=d/2;
  const fl=block(w,0.12,d,TEX.plank);fl.position.set(cx,0.06,cz);scene.add(fl);
  wallX(cx-hw,cx+hw,cz-hd,h,(doors.n||[]).map(o=>cx+o));
  wallX(cx-hw,cx+hw,cz+hd,h,(doors.s||[]).map(o=>cx+o));
  wallZ(cz-hd+T/2,cz+hd-T/2,cx-hw,h,(doors.w||[]).map(o=>cz+o));
  wallZ(cz-hd+T/2,cz+hd-T/2,cx+hw,h,(doors.e||[]).map(o=>cz+o));
}
function crate(x,z,s=1.15){
  const m=block(s,s,s,TEX.crate,s);m.position.set(x,s/2,z);scene.add(m);
  addSolid(x-s/2,z-s/2,x+s/2,z+s/2,s);
}

/* ============ 殭屍（單字牌／AI／波次會在下方控制） ============ */
const zombies=[];
const Z_SPAWNS=[[0,-62],[56,-4],[-60,10],[30,56],[-36,-56],[64,44],[-64,-38],[12,66]];
let boss=null;
function wordSprite(text,color='#173443'){
  const c=document.createElement('canvas');c.width=512;c.height=106;const g=c.getContext('2d');
  g.fillStyle='rgba(255,255,255,.96)';g.fillRect(5,5,502,96);g.strokeStyle=color;g.lineWidth=8;g.strokeRect(5,5,502,96);
  g.fillStyle=color;g.font='800 47px Arial';g.textAlign='center';g.textBaseline='middle';g.fillText(text,256,54);
  const t=new THREE.CanvasTexture(c);t.colorSpace=THREE.SRGBColorSpace;
  const m=new THREE.SpriteMaterial({map:t,transparent:true,depthTest:false});const s=new THREE.Sprite(m);s.scale.set(2.85,.59,1);return s;
}
function setZombieLabel(g,text,color){
  if(g.userData.label){g.remove(g.userData.label);g.userData.label.material.map.dispose();g.userData.label.material.dispose();}
  const s=wordSprite(text,color);s.position.y=g.userData.kind==='boss'?4.5:2.95;s.userData.noHit=true;g.add(s);g.userData.label=s;
}
function makeZombie(x,z,kind='normal',wordData){
  const g=new THREE.Group();
  const spec=kind==='fast'?{scale:.76,hp:2,speed:1.4,damage:7,color:0x86d748}:
    kind==='tank'?{scale:1.28,hp:8,speed:.52,damage:13,color:0x746f50}:
    kind==='boss'?{scale:1.48,hp:12,speed:.58,damage:15,color:0x746f50}:{scale:1,hp:3,speed:.82,damage:10,color:0x57a63e};
  const skin=new THREE.MeshLambertMaterial({color:0x57a63e});
  skin.color.setHex(spec.color);
  const shirt=new THREE.MeshLambertMaterial({color:0x2f8f86});
  const pants=new THREE.MeshLambertMaterial({color:0x35406e});
  const face=new THREE.MeshLambertMaterial({map:TEX.zface});
  const head=new THREE.Mesh(new THREE.BoxGeometry(0.72,0.72,0.72),
    [skin,skin,skin,skin,face,skin]);              // +z 面是臉
  head.position.y=2.16;head.userData.part='head';g.add(head);
  const body=new THREE.Mesh(new THREE.BoxGeometry(0.86,1.1,0.42),shirt);
  body.position.y=1.25;body.userData.part='body';g.add(body);
  for(const s of[-1,1]){
    const leg=new THREE.Mesh(new THREE.BoxGeometry(0.38,1.0,0.38),pants);
    leg.position.set(s*0.22,0.5,0);leg.userData.part='body';g.add(leg);
    const arm=new THREE.Mesh(new THREE.BoxGeometry(0.3,0.3,0.95),skin);
    arm.position.set(s*0.58,1.62,0.5);arm.userData.part='body';g.add(arm);
    arm.userData.isArm=true;
  }
  g.position.set(x,0,z);g.rotation.y=rnd(TAU);g.scale.setScalar(spec.scale);
  g.traverse(o=>{o.userData.zomb=g;});
  g.userData={phase:rnd(TAU),hp:spec.hp,maxHp:spec.hp,alive:true,kx:0,kz:0,flash:0,deadT:0,
    mats:[skin,shirt,pants,face],kind,speed:spec.speed,damage:spec.damage,attackT:rnd(.2,.8),word:wordData||null,
    bossShield:kind==='boss'?3:0};
  if(kind==='boss'){boss=g;setZombieLabel(g,'👑 BOSS 護盾 ×3','#7d47b8');}
  else if(wordData)setZombieLabel(g,wordData.word,wordData===targetWord?'#159b68':'#334c61');
  scene.add(g);zombies.push(g);
  return g;
}
function spawnZombie(kind='normal',wordData){
  const cand=Z_SPAWNS.filter(p=>Math.hypot(p[0]-player.x,p[1]-player.z)>18);
  const p=cand.length?cand[(rnd(cand.length))|0]:Z_SPAWNS[(rnd(Z_SPAWNS.length))|0];
  return makeZombie(p[0]+rnd(-3,3),p[1]+rnd(-3,3),kind,wordData);
}
function hitZombie(g,part,hitPoint){
  const u=g.userData;if(!u.alive)return;
  if(g===boss&&u.bossShield>0){
    showObjective('🛡️ 魔王護盾還在！先打倒答對單字的殭屍');sndEmpty();return;
  }
  if(g!==boss&&!isCorrectZombie(g)){
    onWrong(g);sparks(hitPoint,0xff5544,7);hitmarkShow();sndHit();return;
  }
  const dmg=part==='head'?u.hp:1;
  u.hp-=dmg;u.flash=0.13;
  const d=Math.hypot(g.position.x-player.x,g.position.z-player.z)||1;
  const kb=part==='head'?3.6:2.2;      // 爆頭擊退更多
  u.kx=(g.position.x-player.x)/d*kb;u.kz=(g.position.z-player.z)/d*kb;
  sparks(hitPoint,0x7fd45a,7);
  hitmarkShow();
  popAt(hitPoint,part==='head'?'爆頭!':'-'+dmg,part==='head'?'#ffd34d':'#fff');
  if(u.hp<=0){
    u.alive=false;u.deadT=0;kills++;
    document.getElementById('vKills').textContent=kills;
    sndKill();sparks(g.position.clone().setY(1.4),0xffe08a,12);
    if(g===boss){boss=null;onBossDefeated();}
    else{
      const correct=isCorrectZombie(g);
      if(correct){dropAmmo(g.position.x,g.position.z);onCorrect(g);}
      else onWrong(g);
      if(Math.random()<0.28)dropAmmo(g.position.x+rnd(-.4,.4),g.position.z+rnd(-.4,.4));
    }
  }else{
    part==='head'?sndHead():sndHit();
  }
}

function sparks(pos,color,n){

}
function popAt(pos,txt,color){
  const p=pos.clone().project(camera);
  if(p.z>1)return;
  const el=document.createElement('div');
  el.className='pop';el.textContent=txt;el.style.color=color;
  el.style.left=((p.x*0.5+0.5)*innerWidth)+'px';
  el.style.top=((-p.y*0.5+0.5)*innerHeight)+'px';
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),950);
}

/* ============ 波次、單字與逃生目標 ============ */
const waveEl=document.getElementById('wave'),questionEl=document.getElementById('question'),comboEl=document.getElementById('combo'),
  objectiveEl=document.getElementById('objective');
let wave=0,waveLeft=0,targetWord=null,roundKind='word',combo=0,weaponLevel=0,slowT=0,
  gateReady=false,gateOpen=false,gameWon=false,survivalStart=0,spellWord='',spellIndex=0,exitGate=null;
function pickWord(except){
  const list=VOCAB.filter(x=>x!==except);return (list.length?list:VOCAB)[(rnd(list.length||1))|0];
}
function showObjective(text){objectiveEl.textContent=text;}
function weaponName(){return weaponLevel===2?'散彈槍':weaponLevel===1?'衝鋒槍':'手槍';}
function updateCombo(){
  weaponLevel=combo>=7?2:combo>=3?1:0;
  comboEl.textContent=weaponName()+' ・ COMBO ×'+combo+(weaponLevel?' ・ 火力升級！':'');
  document.querySelector('#ammo .gname').textContent=weaponName();
}
function isCorrectZombie(g){return !!(g&&g.userData.word&&g.userData.word===targetWord);}
function repaintLabels(){
  for(const z of zombies)if(z.userData.alive&&z!==boss&&z.userData.word)
    setZombieLabel(z,z.userData.word.word,z.userData.word===targetWord?'#159b68':'#334c61');
}
function setQuestion(say=true){
  if(roundKind==='spell'){
    const ch=spellWord[spellIndex]||spellWord[0];targetWord={word:ch.toUpperCase(),chinese:'拼字 '+(spellIndex+1)+'/'+spellWord.length};
    questionEl.textContent='⌨️ 拼出 '+spellWord.toUpperCase()+'：先打字母 '+targetWord.word;
  }else{
    targetWord=pickWord(targetWord);
    questionEl.textContent=roundKind==='listen'?'🔊 聽發音，找出正確英文：':('題目：'+targetWord.chinese+' → 找英文');
    if(say)speakWord(targetWord.word);
  }
  repaintLabels();
}
function addWaveZombie(i){
  const kind=i%7===4?'fast':(wave>3&&i%9===6?'tank':'normal');
  let w;
  if(i===0)w=targetWord;
  else if(roundKind==='spell')w={word:String.fromCharCode(65+(rnd(26)|0)),chinese:'字母'};
  else w=pickWord(targetWord);
  spawnZombie(kind,w);
}
function clearWaveEnemies(){
  for(const z of zombies)if(z.userData.alive&&z!==boss){z.userData.alive=false;z.userData.deadT=.72;}
}
function beginWave(){
  if(gameWon||gateReady)return;
  wave++;roundKind=wave%5===0?'boss':(wave%4===0?'spell':(wave%3===0?'listen':'word'));
  waveEl.textContent='🌊 第 '+wave+' 波 '+(roundKind==='boss'?'魔王來襲！':roundKind==='listen'?'聽力波次':roundKind==='spell'?'拼字波次':'來襲！');
  if(roundKind==='spell'){const w=pickWord();spellWord=w.word.replace(/[^a-z]/ig,'').slice(0,8)||'word';spellIndex=0;}
  setNight(wave>=6);setQuestion(true);sndWave();
  if(wave>1&&wave%3===0){const p=Z_SPAWNS[(rnd(Z_SPAWNS.length))|0];ammoBox(p[0]+rnd(-5,5),p[1]+rnd(-5,5),45,false);showObjective('📦 空投補給已落下：黃色光柱旁有大量彈藥');}
  if(roundKind==='boss'){
    waveLeft=0;showObjective('👑 魔王護盾：連續答對 3 題後，才能攻擊本體');
    for(let i=0;i<5;i++)addWaveZombie(i);spawnZombie('boss');
  }else{
    waveLeft=roundKind==='spell'?1:1+Math.min(3,Math.floor(wave/2));showObjective('答對 '+waveLeft+' 題，完成本波防守');
    for(let i=0;i<Math.min(9,4+wave);i++)addWaveZombie(i);
  }
}
function setNight(on){
  scene.background.setHex(on?0x172635:SKY);scene.fog.color.setHex(on?0x172635:SKY);
  sun.intensity=on?.3:.85;
}
function onCorrect(g){
  combo++;updateCombo();
  if(boss&&boss.userData.bossShield>0){
    boss.userData.bossShield--;sndShield();
    if(boss.userData.bossShield<=0){slowT=1.1;setZombieLabel(boss,'👑 護盾破除！攻擊本體','#cf4c3e');showObjective('⚡ 護盾破除了！集中火力擊倒魔王');}
    else{setZombieLabel(boss,'👑 BOSS 護盾 ×'+boss.userData.bossShield,'#7d47b8');setQuestion(true);}
    return;
  }
  if(roundKind==='spell'){spellIndex++;if(spellIndex<spellWord.length){setQuestion(false);addWaveZombie(0);return;}}
  waveLeft--;
  if(waveLeft>0){showObjective('答對 '+waveLeft+' 題，完成本波防守');setQuestion(true);addWaveZombie(0);}
  else completeWave();
}
function onWrong(g){
  combo=0;updateCombo();if(!g.userData.enrage)g.userData.speed*=1.65;g.userData.enrage=6;
  if(g.userData.word)setZombieLabel(g,g.userData.word.word+'！','#c53b35');
  showObjective('❌ 打錯了！那隻殭屍狂暴衝來，連擊歸零');
}
function completeWave(){
  clearWaveEnemies();
  if(wave>=7){gateReady=true;activateGate();return;}
  waveEl.textContent='✅ 第 '+wave+' 波守住了！';showObjective('10 秒喘息：撿彈藥、準備下一波');
  setTimeout(beginWave,6500);
}
function onBossDefeated(){
  combo+=2;updateCombo();waveEl.textContent='🏆 魔王擊倒！';showObjective('魔王倒下，補給已掉落');dropAmmo(player.x+1,player.z+1);setTimeout(completeWave,2400);
}
function activateGate(){
  waveEl.textContent='🚪 逃生門已出現';questionEl.textContent='前往金色光柱，答對最後一道題逃離堡壘';showObjective('前往中央堡北側的金色逃生門');
  if(exitGate)return;
  exitGate=new THREE.Group();
  const door=new THREE.Mesh(new THREE.BoxGeometry(2.4,3.4,.18),new THREE.MeshBasicMaterial({color:0xffd34d,transparent:true,opacity:.72}));
  door.position.y=1.7;exitGate.add(door);
  const beam=new THREE.Mesh(new THREE.BoxGeometry(.8,24,.8),new THREE.MeshBasicMaterial({color:0xffdc4d,transparent:true,opacity:.17,blending:THREE.AdditiveBlending,depthWrite:false}));
  beam.position.y=12;exitGate.add(beam);exitGate.position.set(0,0,-11.2);scene.add(exitGate);
}
function openGateQuiz(){
  if(gateOpen||!gateReady)return;paused=true;
  const answer=pickWord(),choices=[answer];while(choices.length<3){const w=pickWord(answer);if(!choices.includes(w))choices.push(w);}
  choices.sort(()=>rnd(-1,1));document.getElementById('quizPrompt').textContent='「'+answer.chinese+'」的英文是？';
  const box=document.getElementById('quizChoices');box.innerHTML='';
  for(const w of choices){const b=document.createElement('button');b.type='button';b.className='choiceBtn';b.textContent=w.word;b.onclick=()=>{
    if(w===answer){gateOpen=true;document.getElementById('quiz').classList.remove('show');paused=false;winGame();}
    else{b.textContent='再想想！';b.style.background='#9b3735';}
  };box.appendChild(b);}document.getElementById('quiz').classList.add('show');
}
function winGame(){
  gameWon=true;playing=false;stopBgm();waveEl.textContent='🎉 成功逃生！';
  const sec=Math.max(1,Math.round((performance.now()-survivalStart)/1000));
  overlay.innerHTML='<h1>🏆 成功逃生！</h1><div class="sub">F O R T &nbsp; C L E A R</div><p>擊殺 '+kills+' 隻 ・ 最終連擊 ×'+combo+' ・ 存活 '+sec+' 秒</p><p class="go">英文答對，火力就更強！</p><button class="actionBtn" type="button" onclick="location.reload()">↻ 再守一輪</button>';
  overlay.classList.remove('hidden');
}

/* ============ 彈藥補給（走近自動撿） ============ */
const pickups=[];
function ammoBox(x,z,amount,big){
  const s=big?0.85:0.55;
  const m=block(s,s,s,TEX.ammo,s);m.position.set(x,0.55,z);scene.add(m);
  m.userData.noHit=true;
  const pil=new THREE.Mesh(new THREE.BoxGeometry(0.5,big?26:8,0.5),
    new THREE.MeshBasicMaterial({color:0xffd34d,transparent:true,opacity:0.16,
      blending:THREE.AdditiveBlending,depthWrite:false}));
  pil.position.set(x,big?13:4,z);scene.add(pil);pil.userData.noHit=true;
  pickups.push({m,pil,x,z,amount,big,taken:false,t:0,life:big?Infinity:20});
}
const dropAmmo=(x,z)=>ammoBox(x,z,10,false);
/* 固定彈藥點：多數藏在堡壘裡，逼玩家冒險進堡 */
ammoBox(-8,0,30,true);       // 中央堡西廂
ammoBox(40,-44,30,true);
ammoBox(48,28,30,true);
ammoBox(-46,-30,30,true);
ammoBox(-42,36,30,true);
ammoBox(-6,52,30,true);
ammoBox(22,-14,30,true);     // 野外一箱

/* ============ 第一人稱槍模型 ============ */
const gunGrp=new THREE.Group();
{
  const bk=new THREE.MeshLambertMaterial({color:0x181a1f});
  const add=(w,h,d,x,y,z,rx=0)=>{
    const m=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),bk);
    m.position.set(x,y,z);m.rotation.x=rx;gunGrp.add(m);
  };
  add(0.17,0.17,0.85,0,0.05,-0.5);        // 槍管
  add(0.21,0.26,0.5,0,-0.03,-0.02);       // 槍身
  add(0.17,0.44,0.22,0,-0.32,0.1,0.3);    // 握把
  add(0.055,0.1,0.055,0,0.17,-0.86);      // 準星
  gunGrp.position.set(0.44,-0.38,-0.95);
  gunGrp.rotation.y=-0.06;
  camera.add(gunGrp);
  const flash=new THREE.Mesh(new THREE.PlaneGeometry(0.42,0.42),
    new THREE.MeshBasicMaterial({color:0xffe08a,transparent:true,opacity:0.95,
      blending:THREE.AdditiveBlending,depthWrite:false,side:THREE.DoubleSide}));
  flash.position.set(0,0.05,-0.98);flash.visible=false;flash.userData.noHit=true;
  gunGrp.add(flash);gunGrp.userData.flash=flash;
}

/* ============ 玩家狀態與操控 ============ */
const player={x:0,z:34,yaw:0,pitch:0,vx:0,vz:0,vy:0,y:0,onGround:true};
const EYE=1.7,WALK=6.5,JUMP=7.8;     // 跳躍力剛好上 1.15m 木箱、上不了 1.5m 矮牆
const key={};
let playing=false,paused=false;
let mag=30,reserve=120,recoil=0,bobT=0,kills=0,hp=100,fireCd=0,fireHeld=false;
let reloading=false,reloadT=0,reloadS1=false,reloadS2=false;
const reloadBarEl=document.getElementById('reloadBar'),
      reloadFillEl=document.getElementById('reloadFill'),
      ammoNumEl=document.getElementById('ammoNum');

addEventListener('keydown',e=>{
  key[e.code]=true;
  if(e.code==='Space'){e.preventDefault();doJump();}
  if(e.code==='KeyR')reload();
});
addEventListener('keyup',e=>key[e.code]=false);
function doJump(){
  if(playing&&!paused&&player.onGround){player.vy=JUMP;player.onGround=false;}
}
function reload(){                    // 1 秒換彈：期間不能開槍，可移動
  if(!playing||reloading||mag>=30||reserve<=0)return;
  reloading=true;reloadT=0;reloadS1=false;reloadS2=false;
  reloadBarEl.style.display='block';reloadFillEl.style.width='0%';
}
function updAmmo(){
  document.getElementById('vMag').textContent=mag;
  document.getElementById('vReserve').textContent=reserve;
  ammoNumEl.classList.toggle('low',reserve<30);
}
function hurt(amount,from){
  if(!playing||gameWon)return;
  hp=Math.max(0,hp-amount);document.getElementById('hpText').textContent=hp+' / 100';
  document.getElementById('hpFill').style.width=hp+'%';sndHurt();
  const f=document.getElementById('damageFlash');f.classList.remove('show');void f.offsetWidth;f.classList.add('show');
  if(hp<=0){
    playing=false;paused=true;stopBgm();
    overlay.innerHTML='<h1>💀 堡壘失守</h1><div class="sub">T R Y &nbsp; A G A I N</div><p>擊殺 '+kills+' 隻 ・ 撐到第 '+wave+' 波</p><p class="go">打錯單字會讓殭屍狂暴，先找正確目標！</p><button class="actionBtn" type="button" onclick="location.reload()">↻ 再試一次</button>';
    overlay.classList.remove('hidden');
  }
}
const ray=new THREE.Raycaster();
ray.near=1.6;ray.far=250;             // near 避開第一人稱槍模型
const RAY_C=new THREE.Vector2(0,0);
function fire(){
  if(!playing||paused||reloading||fireCd>0)return;
  if(mag<=0){sndEmpty();reload();return;}
  fireCd=weaponLevel===1?.11:weaponLevel===2?.46:.28;
  mag--;updAmmo();recoil=1;sndShot();
  const f=gunGrp.userData.flash;
  f.visible=true;f.rotation.z=rnd(TAU);
  setTimeout(()=>f.visible=false,55);
  const shots=weaponLevel===2?3:1;
  for(let n=0;n<shots;n++){
    const aim=shots===1?RAY_C:new THREE.Vector2(rnd(-.055,.055),rnd(-.04,.04));ray.setFromCamera(aim,camera);
    for(const h of ray.intersectObjects(scene.children,true)){
      const o=h.object;if(o.userData.noHit)continue;const z=o.userData.zomb;
      if(z){if(!z.userData.alive)continue;hitZombie(z,o.userData.part||'body',h.point);}
      else sparks(h.point,0xc9b382,5);break;
    }
  }
  if(mag===0)reload();                            // 打空自動換彈
}

/* 滑鼠：pointer lock 環視 */
const overlay=document.getElementById('overlay');
function startGame(){
  ensureAudio();
  try{const u=new SpeechSynthesisUtterance(' ');u.volume=0;speechSynthesis.speak(u);}catch(e){}
  overlay.classList.add('hidden');
  if(!playing){playing=true;survivalStart=performance.now();startBgm();beginWave();}
  paused=false;
  if(!isTouch)renderer.domElement.requestPointerLock();
}
document.getElementById('startBtn').addEventListener('click',startGame);
document.addEventListener('pointerlockchange',()=>{
  if(!isTouch&&playing&&document.pointerLockElement!==renderer.domElement){
    paused=true;overlay.classList.remove('hidden');
    document.getElementById('goText').textContent='已暫停，按按鈕繼續守城';
  }else paused=false;
});
addEventListener('mousemove',e=>{
  if(document.pointerLockElement!==renderer.domElement)return;
  player.yaw-=e.movementX*0.0024;
  player.pitch=clamp(player.pitch-e.movementY*0.0024,-1.45,1.45);
});
addEventListener('mousedown',e=>{
  if(e.button===0&&document.pointerLockElement===renderer.domElement)fire();
});

/* 觸控：左半螢幕虛擬搖桿、右半螢幕滑動環視 */
if(isTouch)document.getElementById('touchUI').classList.remove('hidden');
const stickEl=document.getElementById('moveStick'),knob=document.getElementById('moveKnob');
let stickId=null,lookId=null,stickVec={x:0,y:0},lookLast={x:0,y:0};
addEventListener('touchstart',e=>{
  if(!playing)return;
  for(const t of e.changedTouches){
    const el=document.elementFromPoint(t.clientX,t.clientY);
    if(el&&(el.id==='fireBtn')){fire();fireHeld=true;el.classList.add('active');continue;}
    if(el&&(el.id==='jumpBtn')){doJump();continue;}
    if(el&&(el.id==='btnPause'))continue;
    if(t.clientX<innerWidth*0.45&&stickId===null){
      stickId=t.identifier;updStick(t);
    }else if(lookId===null){
      lookId=t.identifier;lookLast={x:t.clientX,y:t.clientY};
    }
  }
},{passive:false});
addEventListener('touchmove',e=>{
  for(const t of e.changedTouches){
    if(t.identifier===stickId)updStick(t);
    else if(t.identifier===lookId){
      player.yaw-=(t.clientX-lookLast.x)*0.0052;
      player.pitch=clamp(player.pitch-(t.clientY-lookLast.y)*0.0052,-1.45,1.45);
      lookLast={x:t.clientX,y:t.clientY};
    }
  }
  if(playing)e.preventDefault();
},{passive:false});
addEventListener('touchend',e=>{
  for(const t of e.changedTouches){
    if(t.identifier===stickId){stickId=null;stickVec={x:0,y:0};knob.style.left='70px';knob.style.top='70px';}
    if(t.identifier===lookId)lookId=null;
  }
  document.getElementById('fireBtn').classList.remove('active');
  fireHeld=false;
});
function updStick(t){
  const r=stickEl.getBoundingClientRect();
  let dx=t.clientX-(r.left+70),dy=t.clientY-(r.top+70);
  const len=Math.hypot(dx,dy),max=58;
  if(len>max){dx*=max/len;dy*=max/len;}
  stickVec={x:dx/max,y:dy/max};
  knob.style.left=(70+dx)+'px';knob.style.top=(70+dy)+'px';
}
document.getElementById('btnPause').addEventListener('click',()=>{
  paused=true;overlay.classList.remove('hidden');
  document.getElementById('goText').textContent='已暫停，按按鈕繼續守城';
});

/* ============ 主迴圈 ============ */
let lastT=performance.now();
function loop(now){
  requestAnimationFrame(loop);
  const dt=Math.min(0.05,(now-lastT)/1000);lastT=now;
  if(playing&&!paused){
    fireCd=Math.max(0,fireCd-dt);if(fireHeld)fire();slowT=Math.max(0,slowT-dt);
    /* 移動輸入（鍵盤＋搖桿） */
    let fw=(key.KeyW||key.ArrowUp?1:0)-(key.KeyS||key.ArrowDown?1:0),
        st=(key.KeyD||key.ArrowRight?1:0)-(key.KeyA||key.ArrowLeft?1:0);
    fw+=-stickVec.y;st+=stickVec.x;
    const mLen=Math.hypot(fw,st);
    if(mLen>1){fw/=mLen;st/=mLen;}
    const sy=Math.sin(player.yaw),cy=Math.cos(player.yaw);
    const tx=(-sy*fw+cy*st)*WALK, tz=(-cy*fw-sy*st)*WALK;
    player.vx+=(tx-player.vx)*Math.min(1,dt*10);
    player.vz+=(tz-player.vz)*Math.min(1,dt*10);
    /* 分軸位移＋碰撞（帶腳高，可站上箱子） */
    let nx=player.x+player.vx*dt;
    if(!collide(nx,player.z,player.y))player.x=nx;else player.vx=0;
    let nz=player.z+player.vz*dt;
    if(!collide(player.x,nz,player.y))player.z=nz;else player.vz=0;
    /* 殭屍身體推開玩家（活的才擋路） */
    for(const z of zombies){
      if(!z.userData.alive||player.y>1.9)continue;
      const dx=player.x-z.position.x,dz=player.z-z.position.z;
      const d=Math.hypot(dx,dz);
      if(d<0.95&&d>0.001){player.x=z.position.x+dx/d*0.95;player.z=z.position.z+dz/d*0.95;}
    }
    /* 跳躍重力＋走出邊緣落下 */
    const gh=groundAt(player.x,player.z,player.y);
    if(player.onGround){
      if(player.y>gh+0.02){player.onGround=false;player.vy=0;}
      else player.y=gh;
    }else{
      player.vy-=22*dt;player.y+=player.vy*dt;
      if(player.vy<=0&&player.y<=gh){player.y=gh;player.vy=0;player.onGround=true;}
    }
    /* 換彈進度（1 秒；退匣→上匣兩段音） */
    if(reloading){
      reloadT+=dt;
      reloadFillEl.style.width=(Math.min(1,reloadT)*100)+'%';
      if(!reloadS1&&reloadT>0.12){reloadS1=true;sndMagOut();}
      if(!reloadS2&&reloadT>0.72){reloadS2=true;sndMagIn();}
      if(reloadT>=1){
        reloading=false;reloadBarEl.style.display='none';
        const take=Math.min(30-mag,reserve);
        mag+=take;reserve-=take;updAmmo();
      }
    }
    /* 相機與槍 */
    const sp=Math.hypot(player.vx,player.vz);
    bobT+=dt*(4+sp*1.1);
    camera.position.set(player.x,EYE+player.y+Math.sin(bobT)*0.015*(sp/WALK),player.z);
    camera.rotation.set(player.pitch,player.yaw,0);
    recoil=Math.max(0,recoil-dt*8);
    gunGrp.position.z=-0.95+recoil*0.12;
    if(reloading){                     // 換彈動畫：槍下沉側轉再回位
      const k=Math.sin(Math.PI*Math.min(1,reloadT));
      gunGrp.position.y=-0.38-0.34*k;
      gunGrp.rotation.z=0.7*k;
      gunGrp.rotation.x=-0.25*k;
    }else{
      gunGrp.rotation.z=0;
      gunGrp.rotation.x=recoil*0.14;
      gunGrp.position.y=-0.38+Math.sin(bobT*2)*0.012*(sp/WALK);
    }
    /* 殭屍：遊走追擊／抓擊／中彈閃紅／擊退／倒下淡出 */
    for(let i=zombies.length-1;i>=0;i--){
      const z=zombies[i],u=z.userData;
      if(u.alive){
        const p=u.phase+now*0.0016;
        const dx=player.x-z.position.x,dz=player.z-z.position.z,d=Math.hypot(dx,dz)||.001;
        const pace=u.speed*(u.enrage?1.3:1)*(slowT>.01?.35:1);
        if(d>1.08){
          const zx=z.position.x+dx/d*pace*dt,zz=z.position.z+dz/d*pace*dt;
          if(!collide(zx,z.position.z,0))z.position.x=zx;
          if(!collide(z.position.x,zz,0))z.position.z=zz;
          z.rotation.y=Math.atan2(dx,dz);
        }else{
          u.attackT-=dt*(slowT>.01?.35:1);
          if(u.attackT<=0){u.attackT=.82+(u.kind==='tank'?.25:0);hurt(u.damage,{x:z.position.x,z:z.position.z});}
        }
        if(u.enrage){u.enrage-=dt;if(u.enrage<=0){u.enrage=0;u.speed/=1.65;if(u.word)setZombieLabel(z,u.word.word,'#334c61');}}
        z.children.forEach(ch=>{if(ch.userData.isArm)ch.rotation.x=Math.sin(p)*0.09;});
        if(u.kx||u.kz){                // 擊退（撞牆就停）
          const zx=z.position.x+u.kx*dt,zz=z.position.z+u.kz*dt;
          if(!collide(zx,zz,0)){z.position.x=zx;z.position.z=zz;}
          u.kx*=Math.max(0,1-dt*7);u.kz*=Math.max(0,1-dt*7);
          if(Math.hypot(u.kx,u.kz)<0.05)u.kx=u.kz=0;
        }
        if(u.flash>0){
          u.flash-=dt;
          const on=u.flash>0;
          u.mats.forEach(m=>m.emissive.setHex(on?0xbb2211:0x000000));
        }
      }else{
        u.deadT+=dt;
        z.rotation.x=-Math.min(1,u.deadT/0.5)*1.45;   // 向後倒下
        if(u.deadT>0.5){
          const op=Math.max(0,1-(u.deadT-0.5)/0.6);
          u.mats.forEach(m=>{m.transparent=true;m.opacity=op;});
        }
        if(u.deadT>1.15){scene.remove(z);zombies.splice(i,1);}
      }
    }
    /* 彈藥箱：旋轉＋撿取＋重生 */
    for(let i=pickups.length-1;i>=0;i--){
      const b=pickups[i];
      if(b.taken){
        if(b.big){b.t+=dt;if(b.t>25){b.taken=false;b.m.visible=b.pil.visible=true;}}
        continue;
      }
      b.m.rotation.y+=dt*1.6;
      b.m.position.y=0.55+Math.sin(now*0.003+b.x)*0.09;
      if(!b.big){b.life-=dt;if(b.life<=0){scene.remove(b.m);scene.remove(b.pil);pickups.splice(i,1);continue;}}
      if(Math.hypot(b.x-player.x,b.z-player.z)<1.5&&player.y<1.2){
        reserve+=b.amount;updAmmo();sndPickup();
        popAt(b.m.position.clone().setY(1.4),'+'+b.amount+' 彈藥','#ffd34d');
        if(b.big){b.taken=true;b.t=0;b.m.visible=b.pil.visible=false;}
        else{scene.remove(b.m);scene.remove(b.pil);pickups.splice(i,1);}
      }
    }
    if(gateReady&&exitGate){
      exitGate.rotation.y+=dt*.7;exitGate.children[0].material.opacity=.58+Math.sin(now*.006)*.18;
      if(Math.hypot(exitGate.position.x-player.x,exitGate.position.z-player.z)<2.2)openGateQuiz();
    }
    /* 命中火花粒子 */
    for(let i=parts.length-1;i>=0;i--){
      const m=parts[i],u=m.userData;
      u.life-=dt;
      if(u.life<=0){scene.remove(m);m.material.dispose();parts.splice(i,1);continue;}
      u.vy-=12*dt;
      m.position.x+=u.vx*dt;m.position.y+=u.vy*dt;m.position.z+=u.vz*dt;
      m.rotation.x+=dt*9;m.rotation.y+=dt*7;
    }
    /* 雲漂移 */
    for(const c of clouds){c.position.x+=dt*1.2;if(c.position.x>150)c.position.x=-150;}
  }
  renderer.render(scene,camera);
}
camera.position.set(player.x,EYE,player.z);
camera.rotation.set(0,player.yaw,0);
requestAnimationFrame(loop);

addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});
</script>
</body>
