<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>單字獵人 Word Hunt</title>
    <style>
        :root { --ink:#243047; --purple:#7165d9; --pink:#f46fa1; --paper:#fffdf8; --soft:#eef0ff; --line:#d8daf2; --red:#f15a68; --green:#32bd72; }
        * { box-sizing:border-box; }
        html, body { min-height:100%; overscroll-behavior:none; }
        body { margin:0; min-height:100vh; color:var(--ink); font-family:Arial, "Noto Sans TC", sans-serif; background:radial-gradient(circle at 8% 5%, #ffe2b7 0, transparent 27rem), radial-gradient(circle at 92% 14%, #d9d6ff 0, transparent 28rem), #f7f7ff; user-select:none; }
        button { min-height:48px; border:0; border-radius:14px; padding:0 22px; color:white; font:800 17px/1 Arial, "Noto Sans TC", sans-serif; cursor:pointer; background:linear-gradient(135deg, #8275e6, #6055c6); box-shadow:0 5px 0 #4c43a4, 0 10px 20px rgba(70, 57, 141, .24); transition:transform .15s ease, filter .15s ease; -webkit-tap-highlight-color:transparent; }
        button:hover { filter:brightness(1.06); transform:translateY(-1px); }
        button:active { transform:translateY(3px); box-shadow:0 2px 0 #4c43a4, 0 6px 14px rgba(70, 57, 141, .24); }
        .shell { width:min(900px, 100%); margin:0 auto; padding:22px 16px 32px; }
        .topbar { display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:16px; }
        .topbar-actions { display:flex; gap:8px; }
        .topbar-actions button { min-height:42px; padding:0 13px; border-radius:12px; font-size:15px; white-space:nowrap; }
        .topbar-actions [hidden] { display:none; }
        h1 { margin:0; font-size:clamp(25px, 5vw, 36px); letter-spacing:.03em; }
        .subtitle { margin:4px 0 0; color:#68708d; font-size:14px; font-weight:700; }
        .source-badge { display:inline-block; margin-left:5px; padding:3px 7px; border-radius:999px; color:#5148a9; background:#e9e7ff; font-size:11px; vertical-align:1px; }
        .stat { min-width:100px; padding:9px 13px; border:1px solid var(--line); border-radius:14px; text-align:center; background:rgba(255,255,255,.78); box-shadow:0 4px 14px rgba(67, 72, 115, .08); }
        .stat-label { display:block; color:#7c849f; font-size:12px; font-weight:800; }
        .stat-value { display:block; margin-top:2px; color:#5048aa; font-size:20px; font-weight:900; }
        .card { padding:clamp(16px, 3vw, 26px); border:1px solid rgba(255,255,255,.9); border-radius:24px; background:rgba(255,255,255,.78); box-shadow:0 14px 38px rgba(77, 72, 127, .14); }
        .instruction { margin:0 0 16px; color:#5b647f; font-weight:700; text-align:center; }
        .word-list { display:flex; justify-content:center; gap:9px; flex-wrap:wrap; margin-bottom:20px; }
        button.word-card { min-width:105px; min-height:0; padding:9px 12px; border:2px solid #e4e5f7; border-radius:14px; color:#414b70; text-align:center; background:#fff; box-shadow:0 3px 8px rgba(70, 57, 141, .12); font:900 16px/1 Arial, "Noto Sans TC", sans-serif; transition:opacity .2s, transform .2s, background .2s, border-color .2s; touch-action:manipulation; }
        button.word-card:hover { border-color:#aaa4e8; background:#f8f7ff; filter:none; transform:translateY(-1px); }
        button.word-card:active { box-shadow:0 1px 4px rgba(70, 57, 141, .15); }
        button.word-card:focus-visible { outline:3px solid rgba(113,101,217,.35); outline-offset:3px; }
        .word-card .icon { margin-right:5px; font-size:20px; vertical-align:-2px; }
        .word-card .speaker { margin-left:6px; font-size:14px; opacity:.7; }
        .word-card.speaking { border-color:#8176df; color:#5048aa; background:#efedff; transform:translateY(-2px); }
        .word-card.found { border-color:#8addae; color:#20784b; text-decoration:line-through; background:#e6f8ee; opacity:.82; transform:scale(.97); }
        .word-card.hint { border-color:#f6a83b; background:#fff4d9; animation:hintPulse .7s ease-in-out infinite alternate; }
        .grid-wrap { position:relative; width:min(100%, 620px); margin:0 auto; border:8px solid #f0effa; border-radius:18px; background:#f0effa; touch-action:none; }
        .grid { position:relative; display:grid; grid-template-columns:repeat(9, 1fr); overflow:hidden; border-radius:11px; background:#fff; touch-action:none; }
        .ribbons { position:absolute; z-index:1; inset:0; width:100%; height:100%; overflow:visible; pointer-events:none; }
        .ribbons line { transition:stroke-opacity .3s ease; }
        .ribbons line.correct { filter:drop-shadow(0 0 4px rgba(23, 155, 84, .55)); }
        .cell { position:relative; z-index:2; display:grid; min-width:0; aspect-ratio:1; place-items:center; color:#263052; font-size:clamp(17px, 5.6vw, 31px); font-weight:900; line-height:1; cursor:crosshair; -webkit-tap-highlight-color:transparent; }
        .cell.wrong { color:#b93745; animation:wrong .34s ease 2; }
        .cell.correct { color:#08783d; animation:correctCell .52s ease; }
        .cell.hint { color:#9b5b00; background:#fff0c8; animation:hintPulse .7s ease-in-out infinite alternate; }
        .grid.locked .cell { pointer-events:none; }
        .feedback { min-height:24px; margin:16px 0 0; color:#64708c; font-weight:800; text-align:center; }
        .feedback.good { color:#36855d; }
        .feedback.bad { color:#c54a56; }
        .feedback.good.pop { animation:feedbackPop .5s ease; }
        .success-burst { position:absolute; z-index:4; left:50%; top:50%; padding:12px 18px; border:3px solid #fff; border-radius:18px; color:white; background:linear-gradient(135deg, #36c777, #169b55); box-shadow:0 10px 28px rgba(20, 125, 70, .32); font-size:clamp(22px, 5vw, 34px); font-weight:900; pointer-events:none; transform:translate(-50%, -50%); animation:successBurst .72s ease forwards; }
        .overlay { position:fixed; z-index:10; inset:0; display:flex; align-items:center; justify-content:center; padding:20px; background:rgba(35, 39, 75, .46); }
        .overlay[hidden] { display:none; }
        .dialog { width:min(420px, 100%); padding:28px 24px 24px; border:1px solid rgba(255,255,255,.9); border-radius:25px; color:var(--ink); text-align:center; background:var(--paper); box-shadow:0 22px 55px rgba(19, 24, 60, .34); }
        .dialog h2 { margin:0 0 12px; font-size:28px; }
        .dialog p { margin:8px 0; color:#64708c; font-weight:700; line-height:1.6; }
        .stars { margin:13px 0; color:#ffad32; font-size:35px; letter-spacing:3px; text-shadow:0 2px 0 #d8781d; }
        .stars .empty { color:#d9dbe8; text-shadow:none; }
        .result-list { display:grid; gap:9px; margin:16px 0 22px; }
        .result-row { display:flex; align-items:center; justify-content:space-between; gap:10px; padding:10px 12px; border-radius:12px; background:#f1f2fb; font-weight:900; }
        .result-row .stars { margin:0; font-size:20px; letter-spacing:1px; }
        .total { margin:16px 0 22px; color:#5249ae; font-size:22px; font-weight:900; }
        .dialog-actions { display:flex; justify-content:center; gap:10px; flex-wrap:wrap; }
        .dialog-actions .secondary { color:#514a83; background:#ececf8; box-shadow:0 5px 0 #c9c9df, 0 10px 20px rgba(70, 57, 141, .14); }
        .dialog-actions .secondary:active { box-shadow:0 2px 0 #c9c9df, 0 6px 14px rgba(70, 57, 141, .14); }
        @keyframes wrong { 50% { color:#ff283e; transform:scale(1.13); } }
        @keyframes correctCell { 45% { color:#fff; text-shadow:0 0 8px #168e4f; transform:scale(1.2); } }
        @keyframes feedbackPop { 45% { transform:scale(1.08); } }
        @keyframes successBurst { 0% { opacity:0; transform:translate(-50%, -35%) scale(.55); } 32% { opacity:1; transform:translate(-50%, -50%) scale(1.08); } 75% { opacity:1; transform:translate(-50%, -54%) scale(1); } 100% { opacity:0; transform:translate(-50%, -78%) scale(.92); } }
        @keyframes hintPulse { from { box-shadow:0 0 0 0 rgba(246,168,59,.7); } to { box-shadow:0 0 0 8px rgba(246,168,59,0); } }
        @media (max-width:520px) { body { background:#f7f7ff; } .shell { padding:15px 10px 24px; } .topbar { align-items:flex-start; } .stat { min-width:82px; padding:7px 9px; } .word-card { min-width:92px; padding:8px 10px; font-size:14px; } .card { padding:15px 10px; border-radius:18px; } .grid-wrap { border-width:5px; } }
    </style>
    <link rel="stylesheet" href="game-menu-ui.css">
</head>
<body>
    <main class="shell">
        <header class="topbar">
            <div>
                <h1>🔎 單字獵人</h1>
                <p class="subtitle">拖曳字母，找出所有英文單字！<span class="source-badge" id="sourceBadge">系統內建單字</span></p>
            </div>
            <div class="topbar-actions">
                <button type="button" id="hintButton" hidden>💡 提示</button>
                <button type="button" id="pauseButton" hidden>⏸ 暫停</button>
            </div>
            <div class="stat"><span class="stat-label" id="levelLabel">關卡</span><span class="stat-value" id="levelValue">1 / 3</span></div>
            <div class="stat"><span class="stat-label">本關時間</span><span class="stat-value" id="timer">0 秒</span></div>
        </header>

        <section class="card">
            <p class="instruction">點上方單字可聽發音；從第一個字母拖到最後一個字母，橫、直、斜線都可以！</p>
            <div class="word-list" id="wordList" aria-label="本關單字"></div>
            <div class="grid-wrap" id="gridWrap">
                <svg class="ribbons" id="ribbons" aria-hidden="true"></svg>
                <div class="grid locked" id="grid" aria-label="單字搜尋字母格"></div>
            </div>
            <div class="feedback" id="feedback" aria-live="polite">按下開始遊戲，開始第一關！</div>
        </section>
    </main>

    <div class="overlay" id="overlay">
        <section class="dialog" id="dialog" role="dialog" aria-modal="true" aria-labelledby="dialogTitle">
            <h2 id="dialogTitle">單字獵人</h2>
            <div class="game-intro-line" style="color:#475569"><span id="dialogText">拖出藏在字母格裡的單字！</span><details class="game-info" id="wordHuntInfo"><summary aria-label="查看詳細玩法">!</summary><div class="game-info-panel"><h2>🔎 詳細玩法</h2>從第一個字母拖到最後一個字母，橫、直、斜線都可以。<br>點上方單字可以聽英文發音。<br>共有 <b>3 關</b>，每關都會重新計時；找得越快，得到的星星越多。</div></details></div>
            <div class="stars" id="dialogStars" hidden></div>
            <div class="result-list" id="resultList" hidden></div>
            <div class="total" id="totalStars" hidden></div>
            <div class="dialog-actions">
                <button type="button" id="dialogButton">開始遊戲</button>
                <button type="button" class="secondary game-menu-return" id="menuButton">← 返回遊戲選單</button>
            </div>
        </section>
    </div>

    <div class="overlay" id="pauseOverlay" hidden>
        <section class="dialog" role="dialog" aria-modal="true" aria-labelledby="pauseTitle">
            <h2 id="pauseTitle">⏸ 已暫停</h2>
            <p>時間已停止。準備好再繼續找單字吧！</p>
            <div class="dialog-actions game-pause-actions">
                <button type="button" id="resumeButton">▶ 繼續遊戲</button>
                <button type="button" class="secondary" id="pauseMenuButton">← 返回遊戲選單</button>
            </div>
        </section>
    </div>

    <script>
        // 每關的單字都可直接在這裡替換；icon 是上方提示圖示。
        const LEVELS = [
            { words: [
                { word: 'CAT', icon: '🐱' },
                { word: 'SUN', icon: '☀️' },
                { word: 'FISH', icon: '🐟' }
            ] },
            { words: [
                { word: 'APPLE', icon: '🍎' },
                { word: 'TRAIN', icon: '🚆' },
                { word: 'SNAKE', icon: '🐍' },
                { word: 'HOUSE', icon: '🏠' }
            ] },
            { words: [
                { word: 'MONKEY', icon: '🐒' },
                { word: 'RABBIT', icon: '🐇' },
                { word: 'SCHOOL', icon: '🏫' },
                { word: 'ORANGE', icon: '🍊' },
                { word: 'FLOWER', icon: '🌸' }
            ] }
        ];

        // 每關 [三星門檻秒數, 二星門檻秒數]；超過二星門檻給一星。
        const STAR_THRESHOLDS = [
            [20, 40],
            [30, 60],
            [45, 90]
        ];

        const GRID_SIZE = 9;
        const DIRECTIONS = [{ x: 1, y: 0 }, { x: 1, y: 1 }, { x: 0, y: 1 }, { x: -1, y: 1 }, { x: -1, y: 0 }, { x: -1, y: -1 }, { x: 0, y: -1 }, { x: 1, y: -1 }];
        const RIBBON_COLORS = ['#f6a83b', '#76b6f3', '#8bcf75', '#d98ada', '#f47e8b', '#5bc8bd'];
        const CORRECT_COLOR = '#32bd72';
        const grid = document.getElementById('grid');
        const gridWrap = document.getElementById('gridWrap');
        const ribbons = document.getElementById('ribbons');
        const wordList = document.getElementById('wordList');
        const levelValue = document.getElementById('levelValue');
        const timer = document.getElementById('timer');
        const feedback = document.getElementById('feedback');
        const overlay = document.getElementById('overlay');
        const dialogTitle = document.getElementById('dialogTitle');
        const dialogText = document.getElementById('dialogText');
        const wordHuntInfo = document.getElementById('wordHuntInfo');
        const dialogStars = document.getElementById('dialogStars');
        const resultList = document.getElementById('resultList');
        const totalStars = document.getElementById('totalStars');
        const dialogButton = document.getElementById('dialogButton');
        const menuButton = document.getElementById('menuButton');
        const pauseOverlay = document.getElementById('pauseOverlay');
        const pauseButton = document.getElementById('pauseButton');
        const hintButton = document.getElementById('hintButton');
        const resumeButton = document.getElementById('resumeButton');
        const pauseMenuButton = document.getElementById('pauseMenuButton');
        const sourceBadge = document.getElementById('sourceBadge');

        let gameLevels = LEVELS;
        let wordSource = 'builtin';
        let levelIndex = 0;
        let placements = [];
        let foundWords = new Set();
        let results = [];
        let seconds = 0;
        let timerId = null;
        let dragging = false;
        let startCell = null;
        let activeLine = null;
        let activeSelection = null;
        let paused = false;
        let hintTimeoutId = null;
        const speech = 'speechSynthesis' in window ? window.speechSynthesis : null;
        let englishVoice = null;
        let activeUtterance = null;
        let activeSpeechCard = null;

        function cacheEnglishVoice() {
            if (!speech) return;
            const voices = speech.getVoices();
            englishVoice = voices.find((voice) => /^en-US$/i.test(voice.lang)) || voices.find((voice) => /^en\b/i.test(voice.lang)) || null;
        }

        function speakWord(word, card) {
            if (!speech || typeof SpeechSynthesisUtterance === 'undefined') {
                setFeedback('這台裝置不支援單字發音。', 'bad');
                return;
            }
            if (speech.speaking || speech.pending) speech.cancel();
            activeSpeechCard?.classList.remove('speaking');
            const utterance = new SpeechSynthesisUtterance(word.toLowerCase());
            utterance.lang = 'en-US';
            utterance.rate = .88;
            if (englishVoice) utterance.voice = englishVoice;
            const clearSpeechState = () => {
                if (activeUtterance !== utterance) return;
                card.classList.remove('speaking');
                activeSpeechCard = null;
                activeUtterance = null;
            };
            utterance.onend = clearSpeechState;
            utterance.onerror = clearSpeechState;
            activeUtterance = utterance;
            activeSpeechCard = card;
            card.classList.add('speaking');
            speech.speak(utterance);
        }

        function randomLetter() {
            return String.fromCharCode(65 + Math.floor(Math.random() * 26));
        }

        function makeBoard(words) {
            const letters = Array.from({ length: GRID_SIZE }, () => Array(GRID_SIZE).fill(''));
            const newPlacements = [];
            words.forEach((item) => {
                const word = item.word.toUpperCase();
                let placed = false;
                for (let attempt = 0; attempt < 500 && !placed; attempt += 1) {
                    const direction = DIRECTIONS[Math.floor(Math.random() * DIRECTIONS.length)];
                    const row = Math.floor(Math.random() * GRID_SIZE);
                    const col = Math.floor(Math.random() * GRID_SIZE);
                    const endRow = row + direction.y * (word.length - 1);
                    const endCol = col + direction.x * (word.length - 1);
                    if (endRow < 0 || endRow >= GRID_SIZE || endCol < 0 || endCol >= GRID_SIZE) continue;
                    const fits = [...word].every((letter, index) => {
                        const existing = letters[row + direction.y * index][col + direction.x * index];
                        return !existing || existing === letter;
                    });
                    if (!fits) continue;
                    [...word].forEach((letter, index) => { letters[row + direction.y * index][col + direction.x * index] = letter; });
                    newPlacements.push({ ...item, word, start: { row, col }, end: { row: endRow, col: endCol } });
                    placed = true;
                }
                if (!placed) throw new Error(`無法放入單字：${word}`);
            });
            letters.forEach((row) => row.forEach((letter, col) => { if (!letter) row[col] = randomLetter(); }));
            return { letters, newPlacements };
        }

        function renderWords() {
            wordList.replaceChildren();
            gameLevels[levelIndex].words.forEach((item) => {
                const card = document.createElement('button');
                card.type = 'button';
                card.className = 'word-card';
                card.dataset.word = item.word;
                card.setAttribute('aria-label', `播放 ${item.word} 的英文發音`);
                card.title = `點一下聽 ${item.word} 的發音`;
                if (item.icon) {
                    const icon = document.createElement('span');
                    icon.className = 'icon';
                    icon.setAttribute('aria-hidden', 'true');
                    icon.textContent = item.icon;
                    card.append(icon);
                }
                card.append(item.word);
                const speaker = document.createElement('span');
                speaker.className = 'speaker';
                speaker.setAttribute('aria-hidden', 'true');
                speaker.textContent = '🔊';
                card.append(speaker);
                card.addEventListener('click', () => speakWord(item.word, card));
                wordList.append(card);
            });
        }

        function renderBoard() {
            const board = makeBoard(gameLevels[levelIndex].words);
            placements = board.newPlacements;
            grid.innerHTML = board.letters.map((row, rowIndex) => row.map((letter, colIndex) => `<div class="cell" data-row="${rowIndex}" data-col="${colIndex}">${letter}</div>`).join('')).join('');
            ribbons.replaceChildren();
        }

        function setFeedback(message, type = '') {
            feedback.textContent = message;
            if (type.includes('pop')) {
                feedback.className = 'feedback';
                void feedback.offsetWidth;
            }
            feedback.className = `feedback ${type}`;
        }

        function startTimer(reset = false) {
            stopTimer();
            if (reset) {
                seconds = 0;
                timer.textContent = '0 秒';
            }
            timerId = window.setInterval(() => {
                seconds += 1;
                timer.textContent = `${seconds} 秒`;
            }, 1000);
        }

        function stopTimer() {
            if (timerId !== null) window.clearInterval(timerId);
            timerId = null;
        }

        function starsFor(time, index) {
            const [threeStars, twoStars] = STAR_THRESHOLDS[index];
            if (time <= threeStars) return 3;
            if (time <= twoStars) return 2;
            return 1;
        }

        function starText(stars) {
            return `${'★'.repeat(stars)}<span class="empty">${'☆'.repeat(3 - stars)}</span>`;
        }

        function cellCenter(row, col) {
            const cell = grid.querySelector(`[data-row="${row}"][data-col="${col}"]`);
            const cellRect = cell.getBoundingClientRect();
            const gridRect = grid.getBoundingClientRect();
            return { x: cellRect.left - gridRect.left + cellRect.width / 2, y: cellRect.top - gridRect.top + cellRect.height / 2, width: cellRect.width, height: cellRect.height };
        }

        function addLine(color, opacity = .58) {
            const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
            line.setAttribute('stroke', color);
            line.setAttribute('stroke-width', '0');
            line.setAttribute('stroke-linecap', 'round');
            line.setAttribute('stroke-opacity', opacity);
            ribbons.append(line);
            return line;
        }

        function drawLine(line, from, to, width) {
            line.setAttribute('x1', from.x);
            line.setAttribute('y1', from.y);
            line.setAttribute('x2', to.x);
            line.setAttribute('y2', to.y);
            line.setAttribute('stroke-width', width);
        }

        function maxStepsFor(start, direction) {
            const horizontal = direction.x > 0 ? GRID_SIZE - 1 - start.col : direction.x < 0 ? start.col : Infinity;
            const vertical = direction.y > 0 ? GRID_SIZE - 1 - start.row : direction.y < 0 ? start.row : Infinity;
            return Math.min(horizontal, vertical);
        }

        function snappedSelection(event) {
            const start = cellCenter(startCell.row, startCell.col);
            const rect = grid.getBoundingClientRect();
            const dx = event.clientX - rect.left - start.x;
            const dy = event.clientY - rect.top - start.y;
            if (Math.abs(dx) < 2 && Math.abs(dy) < 2) return { end: { x: start.x, y: start.y }, row: startCell.row, col: startCell.col };
            const angle = Math.atan2(dy, dx);
            const direction = DIRECTIONS[((Math.round(angle / (Math.PI / 4)) % 8) + 8) % 8];
            const unitX = dx / start.width;
            const unitY = dy / start.height;
            const divisor = direction.x * direction.x + direction.y * direction.y;
            const rawSteps = (unitX * direction.x + unitY * direction.y) / divisor;
            const steps = Math.max(0, Math.min(rawSteps, maxStepsFor(startCell, direction)));
            const roundedSteps = Math.round(steps);
            return {
                end: { x: start.x + direction.x * start.width * steps, y: start.y + direction.y * start.height * steps },
                row: startCell.row + direction.y * roundedSteps,
                col: startCell.col + direction.x * roundedSteps
            };
        }

        function cellsInSelection(selection) {
            const rowDelta = selection.row - startCell.row;
            const colDelta = selection.col - startCell.col;
            const steps = Math.max(Math.abs(rowDelta), Math.abs(colDelta));
            if (steps === 0 || (rowDelta !== 0 && colDelta !== 0 && Math.abs(rowDelta) !== Math.abs(colDelta))) return [];
            const rowStep = Math.sign(rowDelta);
            const colStep = Math.sign(colDelta);
            return Array.from({ length: steps + 1 }, (_, index) => grid.querySelector(`[data-row="${startCell.row + rowStep * index}"][data-col="${startCell.col + colStep * index}"]`));
        }

        function selectedPlacement(selection) {
            const selectedCells = cellsInSelection(selection);
            const selectedWord = selectedCells.map((cell) => cell?.textContent || '').join('');
            const reversedWord = [...selectedWord].reverse().join('');
            return placements.find((placement) => !foundWords.has(placement.word) && (placement.word === selectedWord || placement.word === reversedWord));
        }

        function markFound(placement) {
            foundWords.add(placement.word);
            document.querySelector(`.word-card[data-word="${placement.word}"]`).classList.add('found');
            const from = cellCenter(startCell.row, startCell.col);
            const to = cellCenter(activeSelection.row, activeSelection.col);
            activeLine.setAttribute('stroke', CORRECT_COLOR);
            activeLine.setAttribute('stroke-opacity', '.66');
            activeLine.classList.add('correct');
            drawLine(activeLine, from, to, from.width * .76);
            activeLine.dataset.startRow = startCell.row;
            activeLine.dataset.startCol = startCell.col;
            activeLine.dataset.endRow = activeSelection.row;
            activeLine.dataset.endCol = activeSelection.col;
            activeLine = null;
            const selectedCells = cellsInSelection(activeSelection);
            selectedCells.forEach((cell) => cell?.classList.add('correct'));
            window.setTimeout(() => selectedCells.forEach((cell) => cell?.classList.remove('correct')), 560);
            gridWrap.querySelector('.success-burst')?.remove();
            const burst = document.createElement('div');
            burst.className = 'success-burst';
            burst.textContent = `✓ ${placement.word}`;
            gridWrap.append(burst);
            window.setTimeout(() => burst.remove(), 740);
            setFeedback(`答對了！找到了 ${placement.word}！`, 'good pop');
            if (foundWords.size === placements.length) finishLevel();
        }

        function flashWrong(selection) {
            const failedLine = activeLine;
            failedLine.setAttribute('stroke', '#f15a68');
            failedLine.setAttribute('stroke-opacity', '.68');
            window.setTimeout(() => failedLine.setAttribute('stroke-opacity', '0'), 80);
            window.setTimeout(() => failedLine.remove(), 430);
            const first = grid.querySelector(`[data-row="${startCell.row}"][data-col="${startCell.col}"]`);
            const last = grid.querySelector(`[data-row="${selection.row}"][data-col="${selection.col}"]`);
            [first, last].forEach((cell) => {
                cell.classList.remove('wrong');
                void cell.offsetWidth;
                cell.classList.add('wrong');
            });
            setFeedback('再試一次，仔細看看字母方向！', 'bad');
            activeLine = null;
        }

        function onPointerDown(event) {
            const cell = event.target.closest('.cell');
            if (!cell || timerId === null) return;
            event.preventDefault();
            dragging = true;
            startCell = { row: Number(cell.dataset.row), col: Number(cell.dataset.col) };
            activeLine = addLine(RIBBON_COLORS[foundWords.size % RIBBON_COLORS.length]);
            activeSelection = { row: startCell.row, col: startCell.col, end: cellCenter(startCell.row, startCell.col) };
            drawLine(activeLine, activeSelection.end, activeSelection.end, activeSelection.end.width * .76);
            grid.setPointerCapture(event.pointerId);
        }

        function onPointerMove(event) {
            if (!dragging) return;
            event.preventDefault();
            activeSelection = snappedSelection(event);
            const from = cellCenter(startCell.row, startCell.col);
            drawLine(activeLine, from, activeSelection.end, from.width * .76);
        }

        function onPointerEnd(event) {
            if (!dragging) return;
            event.preventDefault();
            dragging = false;
            if (grid.hasPointerCapture(event.pointerId)) grid.releasePointerCapture(event.pointerId);
            activeSelection = snappedSelection(event);
            const placement = selectedPlacement(activeSelection);
            if (placement && !foundWords.has(placement.word)) markFound(placement);
            else flashWrong(activeSelection);
            startCell = null;
        }

        function onPointerCancel() {
            if (!dragging) return;
            dragging = false;
            activeLine?.remove();
            activeLine = null;
            startCell = null;
        }

        function hideOverlay() {
            overlay.hidden = true;
        }

        function returnToMenu() {
            location.href = '../index.html' + location.hash;
        }

        function clearHint() {
            window.clearTimeout(hintTimeoutId);
            grid.querySelectorAll('.cell.hint').forEach((cell) => cell.classList.remove('hint'));
            wordList.querySelectorAll('.word-card.hint').forEach((card) => card.classList.remove('hint'));
        }

        function showHint() {
            if (paused || timerId === null) return;
            const placement = placements.find((item) => !foundWords.has(item.word));
            if (!placement) return;
            clearHint();
            const firstCell = grid.querySelector(`[data-row="${placement.start.row}"][data-col="${placement.start.col}"]`);
            const wordCard = wordList.querySelector(`[data-word="${placement.word}"]`);
            firstCell?.classList.add('hint');
            wordCard?.classList.add('hint');
            setFeedback(`提示：先從 ${placement.word} 的第一個字母開始找！`);
            hintTimeoutId = window.setTimeout(clearHint, 3000);
        }

        function pauseGame() {
            if (paused || timerId === null) return;
            paused = true;
            onPointerCancel();
            stopTimer();
            grid.classList.add('locked');
            clearHint();
            pauseOverlay.hidden = false;
        }

        function resumeGame() {
            if (!paused) return;
            paused = false;
            pauseOverlay.hidden = true;
            grid.classList.remove('locked');
            startTimer();
        }

        function beginLevel(index) {
            levelIndex = index;
            paused = false;
            pauseOverlay.hidden = true;
            foundWords = new Set();
            levelValue.textContent = `${index + 1} / ${gameLevels.length}`;
            renderWords();
            renderBoard();
            grid.classList.remove('locked');
            pauseButton.hidden = false;
            hintButton.hidden = false;
            setFeedback(`第 ${index + 1} 關開始，找出所有單字！`);
            hideOverlay();
            startTimer(true);
        }

        function finishLevel() {
            stopTimer();
            clearHint();
            grid.classList.add('locked');
            const stars = starsFor(seconds, levelIndex);
            results[levelIndex] = { seconds, stars };
            dialogTitle.textContent = `第 ${levelIndex + 1} 關完成！`;
            dialogText.textContent = `你花了 ${seconds} 秒，拿到 ${stars} 顆星！`;
            wordHuntInfo.hidden = true;
            dialogStars.innerHTML = starText(stars);
            dialogStars.hidden = false;
            resultList.hidden = true;
            totalStars.hidden = true;
            dialogButton.textContent = levelIndex === gameLevels.length - 1 ? '完成遊戲' : '下一關';
            dialogButton.onclick = () => levelIndex === gameLevels.length - 1 ? showSummary() : beginLevel(levelIndex + 1);
            overlay.hidden = false;
        }

        function showSummary() {
            const total = results.reduce((sum, result) => sum + result.stars, 0);
            dialogTitle.textContent = '全部關卡完成！';
            dialogText.textContent = '這是你這次的單字獵人紀錄：';
            wordHuntInfo.hidden = true;
            dialogStars.hidden = true;
            resultList.innerHTML = results.map((result, index) => `<div class="result-row"><span>第 ${index + 1} 關　${result.seconds} 秒</span><span class="stars">${starText(result.stars)}</span></div>`).join('');
            resultList.hidden = false;
            totalStars.textContent = `總共獲得 ${total} / ${gameLevels.length * 3} 顆星`;
            totalStars.hidden = false;
            dialogButton.textContent = '重新開始整個遊戲';
            dialogButton.onclick = () => {
                results = [];
                beginLevel(0);
            };
        }

        function normalizeWordHuntVocab(data) {
            if (!data || !Array.isArray(data.words)) return [];
            const seen = new Set();
            return data.words.map((item) => {
                const rawWord = String(item?.word || item?.en || '').trim().toUpperCase();
                const word = rawWord.replace(/[^A-Z]/g, '');
                return { word, icon: String(item?.icon || item?.emoji || '') };
            }).filter((item) => item.word.length >= 2 && item.word.length <= GRID_SIZE && !seen.has(item.word) && seen.add(item.word));
        }

        function buildLevelsFromWords(words) {
            const pool = words.slice().sort(() => Math.random() - .5);
            let cursor = 0;
            return [3, 4, 5].map((wanted) => {
                const count = Math.min(wanted, pool.length);
                const levelWords = [];
                while (levelWords.length < count) {
                    const item = pool[cursor % pool.length];
                    cursor += 1;
                    if (!levelWords.some((entry) => entry.word === item.word)) levelWords.push(item);
                }
                return { words: levelWords };
            });
        }

        function applyWordHuntData(data) {
            const words = normalizeWordHuntVocab(data);
            if (!words.length) return false;
            stopTimer();
            clearHint();
            onPointerCancel();
            paused = false;
            pauseOverlay.hidden = true;
            gridWrap.querySelector('.success-burst')?.remove();
            gameLevels = buildLevelsFromWords(words);
            wordSource = data.builtin === true ? 'builtin' : 'custom';
            sourceBadge.textContent = wordSource === 'builtin' ? '系統內建單字' : '自訂／段考單字';
            results = [];
            levelIndex = 0;
            levelValue.textContent = `1 / ${gameLevels.length}`;
            timer.textContent = '0 秒';
            grid.classList.add('locked');
            pauseButton.hidden = true;
            hintButton.hidden = true;
            dialogTitle.textContent = '單字獵人';
            dialogText.textContent = `找出這次的 ${words.length} 個單字！`;
            wordHuntInfo.hidden = false;
            dialogStars.hidden = true;
            resultList.hidden = true;
            totalStars.hidden = true;
            dialogButton.textContent = '開始遊戲';
            dialogButton.onclick = () => beginLevel(0);
            overlay.hidden = false;
            return true;
        }

        function readHashData() {
            const hash = location.hash.startsWith('#') ? location.hash.slice(1) : location.hash;
            const raw = new URLSearchParams(hash).get('lessonData');
            if (!raw) return null;
            try { return JSON.parse(raw); } catch (error) { return null; }
        }

        grid.addEventListener('pointerdown', onPointerDown);
        grid.addEventListener('pointermove', onPointerMove);
        grid.addEventListener('pointerup', onPointerEnd);
        grid.addEventListener('pointercancel', onPointerCancel);
        pauseButton.addEventListener('click', pauseGame);
        hintButton.addEventListener('click', showHint);
        resumeButton.addEventListener('click', resumeGame);
        menuButton.addEventListener('click', returnToMenu);
        pauseMenuButton.addEventListener('click', returnToMenu);
        window.addEventListener('keydown', (event) => {
            if (event.key === 'Escape' && timerId !== null) {
                event.preventDefault();
                paused ? resumeGame() : pauseGame();
            }
        });
        window.addEventListener('resize', () => {
            ribbons.querySelectorAll('line[data-start-row]').forEach((line) => {
                const from = cellCenter(Number(line.dataset.startRow), Number(line.dataset.startCol));
                const to = cellCenter(Number(line.dataset.endRow), Number(line.dataset.endCol));
                drawLine(line, from, to, from.width * .76);
            });
            if (dragging && activeLine && startCell && activeSelection) {
                const from = cellCenter(startCell.row, startCell.col);
                const to = cellCenter(activeSelection.row, activeSelection.col);
                drawLine(activeLine, from, to, from.width * .76);
            }
        });
        window.addEventListener('message', (event) => {
            if (event.data?.type === 'WORD_HUNT_DATA') applyWordHuntData(event.data.payload);
        });
        if (speech) {
            cacheEnglishVoice();
            speech.addEventListener('voiceschanged', cacheEnglishVoice);
        }
        dialogButton.onclick = () => beginLevel(0);
        applyWordHuntData(readHashData());
    </script>
</body>
</html>
